<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Exam Distractors</title>
    <style>
        :root {
            --primary-color: #2563EB;
            --primary-hover: #1D4ED8;
            --bg-color: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #475569;
            --accent: #10B981;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            color: var(--primary-color);
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.3rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1.2fr 2fr;
            gap: 2.5rem;
        }

        /* Menu Styles */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .menu-item {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 6px solid transparent;
            font-weight: bold;
            font-size: 1.3rem;
            color: var(--text-main);
        }

        .menu-item:hover {
            transform: translateX(5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-left-color: var(--primary-hover);
        }

        .menu-item.active {
            background-color: var(--primary-color);
            color: white;
            border-left-color: var(--accent);
        }

        /* Detail View Styles */
        .detail-view {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .detail-title {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin: 0;
            border-bottom: 3px solid var(--bg-color);
            padding-bottom: 1rem;
        }

        /* INCREASED FONT SIZES BELOW */
        .detail-section {
            background-color: var(--bg-color);
            padding: 1.5rem;
            border-radius: 10px;
            border-left: 5px solid var(--primary-color);
        }

        .detail-section h3 {
            margin-top: 0;
            color: var(--text-main);
            font-size: 1.6rem; /* Bigger Heading */
            margin-bottom: 0.5rem;
        }

        .detail-section p {
            font-size: 1.4rem; /* Bigger Description */
            color: var(--text-main);
            margin: 0;
        }

        .example-box {
            background-color: #EFF6FF;
            padding: 1.5rem;
            border-radius: 10px;
            border-left: 5px solid #60A5FA;
        }
        
        .example-box h4 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #1E3A8A;
            margin-bottom: 1rem;
        }

        .example-box ul {
            margin: 0;
            padding-left: 1.5rem;
        }

        .example-box li {
            font-size: 1.35rem; /* Bigger Examples */
            font-style: italic;
            color: #1E40AF;
            margin-bottom: 0.8rem;
        }

        .tip-box {
            background-color: #ECFDF5;
            padding: 1.5rem;
            border-radius: 10px;
            border-left: 5px solid var(--accent);
            font-weight: bold;
            font-size: 1.4rem; /* Bigger Hint */
            color: #065F46;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 5rem 2rem;
            font-size: 1.5rem;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Listening Exam Distractors</h1>
            <p class="subtitle">Prepare for your IELTS Part 2 or 3 listening evaluations by mastering these common tricks.</p>
        </header>

        <div class="dashboard">
            <div class="menu" id="menu">
                </div>

            <div class="detail-view" id="detail-view">
                <div class="empty-state">
                    👈 Select a distractor from the menu to see expanded examples!
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data for the distractors with expanded examples
        const distractors = [
            {
                id: 'self-correction',
                name: 'Self-Correction',
                description: 'A speaker gives a piece of information and immediately corrects themselves.',
                examples: [
                    '"We will meet at 5:00... oh no wait, let\'s make it 6:00"',
                    '"I\'ll take the blue one. Actually, make it the red one."',
                    '"My flight is on Tuesday. Sorry, I mean Thursday."'
                ],
                tip: 'Focus on the final statement.'
            },
            {
                id: 'negation',
                name: 'Negation',
                description: 'The speaker mentions a word from the answer choice but uses a negative structure.',
                examples: [
                    '"I wanted to buy the blue shirt, but I didn\'t" ',
                    '"We thought about taking the train, but decided not to."',
                    '"The museum isn\'t open on Mondays."'
                ],
                tip: 'Listen for words like "not," "no," or "don\'t".'
            },
            {
                id: 'alternatives',
                name: 'Alternatives/Options',
                description: 'The speaker discusses multiple choices but only selects one.',
                examples: [
                    '"We can travel by train, bus, or plane. I\'m in a rush so I\'ll fly" ',
                    '"You could write an essay, do a presentation, or take a test. I think an essay is best."',
                    '"For lunch, there\'s pizza, salad, or sandwiches. Let\'s get pizza."'
                ],
                tip: 'Wait until the final decision is made[: 9].'
            },
            {
                id: 'time-shift',
                name: 'Time Shift/Tense',
                description: 'The speaker refers to the past or future instead of the present.',
                examples: [
                    '"We used to go to France, but now we go to Spain" [: 10]',
                    '"The old library was on Main Street, but the new one is on Oak."',
                    '"I am studying biology now, but next year I will switch to chemistry."'
                ],
                tip: 'Pay attention to verb tenses and time words[: 11].'
            },
            {
                id: 'similar-sounds',
                name: 'Similar Sounds',
                description: 'Words that sound alike or are easily confused.',
                examples: [
                    '"Austria" vs "Australia", or similar numbers like "15" vs "50" ',
                    '"The price is $13." (sounds very similar to $30).',
                    '"She works in the kitchen." (sounds similar to catching).'
                ],
                tip: 'Listen closely for clear phonetic distinctions.'
            }
        ];

        // DOM Elements
        const menuContainer = document.getElementById('menu');
        const detailContainer = document.getElementById('detail-view');

        // Render menu
        function renderMenu() {
            distractors.forEach(item => {
                const button = document.createElement('div');
                button.className = 'menu-item';
                button.innerText = item.name;
                button.onclick = () => selectItem(item, button);
                menuContainer.appendChild(button);
            });
        }

        // Handle selection
        function selectItem(item, selectedButton) {
            // Manage active state
            document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
            selectedButton.classList.add('active');

            // Build list items for examples
            const examplesHtml = item.examples.map(ex => `<li>${ex}</li>`).join('');

            // Update details view
            detailContainer.innerHTML = `
                <h2 class="detail-title">${item.name}</h2>
                
                <div class="detail-section">
                    <h3>What is it?</h3>
                    <p>${item.description}</p>
                </div>

                <div class="example-box">
                    <h4>Examples in Action:</h4>
                    <ul>
                        ${examplesHtml}
                    </ul>
                </div>

                <div class="tip-box">
                    💡 <strong>Pro Tip:</strong> ${item.tip}
                </div>
            `;
        }

        // Initialize
        renderMenu();
    </script>
</body>
</html>
