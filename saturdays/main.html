<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Adventure</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Changed to allow vertical scrolling, but prevent horizontal scrollbars */
            overflow-x: hidden; 
            overflow-y: auto;
        }

        /* Animated Floating Background Bubbles */
        .bg-bubbles {
            /* Changed to fixed so it stays in the background when you scroll */
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .bg-bubbles div {
            position: absolute;
            bottom: -50px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: floatUp 10s infinite ease-in;
        }
        .bg-bubbles div:nth-child(1) { width: 40px; height: 40px; left: 15%; animation-duration: 8s; }
        .bg-bubbles div:nth-child(2) { width: 80px; height: 80px; left: 35%; animation-duration: 12s; animation-delay: 2s; }
        .bg-bubbles div:nth-child(3) { width: 50px; height: 50px; left: 65%; animation-duration: 10s; animation-delay: 4s; }
        .bg-bubbles div:nth-child(4) { width: 100px; height: 100px; left: 85%; animation-duration: 14s; animation-delay: 1s; }
        .bg-bubbles div:nth-child(5) { width: 30px; height: 30px; left: 50%; animation-duration: 7s; animation-delay: 3s; }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        header {
            text-align: center;
            margin-top: 20px;
            color: #2c3e50;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5em;
            color: #fff;
            -webkit-text-stroke: 2px #3498db;
            text-shadow: 4px 4px 0px #3498db;
            letter-spacing: 2px;
            margin-bottom: 10px;
            padding: 0 20px;
        }

        p.subtitle {
            font-size: 1.4em;
            font-weight: bold;
            color: #2980b9;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 25px;
            border-radius: 30px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 10px; /* Added margin so it doesn't hug the bottom of the scrollable page */
            width: 90%;
            max-width: 450px;
            z-index: 1;
        }

        /* Bubbly Link Buttons */
        .bubble-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 20px 30px;
            border-radius: 60px;
            border: 5px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15), inset 0 -5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
        }

        .bubble-link:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2), inset 0 -5px 15px rgba(0,0,0,0.1);
        }

        .bubble-link:active {
            transform: scale(0.95);
        }

        .icon {
            font-size: 3.5em;
            margin-right: 25px;
            filter: drop-shadow(2px 3px 0px rgba(0,0,0,0.2));
            transition: transform 0.3s ease;
        }

        .bubble-link:hover .icon {
            transform: rotate(-10deg) scale(1.1);
        }

        .text-content {
            display: flex;
            flex-direction: column;
        }

        .link-title {
            font-family: 'Fredoka One', cursive;
            font-size: 1.8em;
            color: #2c3e50;
            margin: 0;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.7);
        }

        .link-desc {
            font-size: 1.05em;
            color: #444;
            margin: 5px 0 0 0;
            font-weight: bold;
        }

        /* Vibrant Bubble Gradients for the Links */
        .link-1 { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .link-2 { background: linear-gradient(135deg, #fccb90 0%, #d57eeb 100%); }
        .link-3 { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); }
        .link-4 { background: linear-gradient(135deg, #fcdcc3 0%, #fcf18e 100%); }

    </style>
</head>
<body>

    <div class="bg-bubbles">
        <div></div><div></div><div></div><div></div><div></div>
    </div>

    <header>
        <h1>English Classes - May 9th </h1>
    </header>

    <div class="link-container">
        
        <a href="health_Movers_A1.html" class="bubble-link link-1">
            <span class="icon">👩🏽‍🔬</span>
            <div class="text-content">
                <h2 class="link-title">Health Movers</h2>
                
            </div>
        </a>

        <a href="health_Flyers.html" class="bubble-link link-2">
            <span class="icon">😷</span>
            <div class="text-content">
               <h2 class="link-title">Health Flyers</h2>
            </div>
        </a>

        <a href="health_B1_B2.html" class="bubble-link link-3">
            <span class="icon">⚕️</span>
            <div class="text-content">
               <h2 class="link-title">Health Freshmen</h2>
            </div>
        </a>
         <a href="phrasal_verbs.html" class="bubble-link link-4">
            <span class="icon">🤟</span>
            <div class="text-content">
               <h2 class="link-title">Phrasal verbs</h2>
            </div>
        </a>
    </div>
    
    

</body>
</html>
